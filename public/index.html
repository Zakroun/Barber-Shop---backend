<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Royale API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #E10600;
            font-size: 3rem;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #aaa;
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .badge {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #4caf50;
            margin-bottom: 40px;
        }

        .badge span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .endpoints {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 480px;
            margin: 0 auto 40px;
        }

        .endpoint {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .method {
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            min-width: 45px;
            text-align: center;
        }

        .get {
            background: #1a3a1a;
            color: #4caf50;
        }

        .post {
            background: #1a2a3a;
            color: #2196f3;
        }

        .path {
            font-family: monospace;
            color: #fff;
            font-size: 14px;
        }

        .desc {
            color: #666;
            font-size: 12px;
            margin-left: auto;
        }

        .footer {
            color: #444;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>BARBER ROYALE</h1>
        <p class="subtitle">API · CASABLANCA</p>

        <div class="badge">
            <span></span> API is running
        </div>

        <div class="endpoints">
            <div class="endpoint">
                <span class="method get">GET</span>
                <span class="path">/api/testDB</span>
                <span class="desc">Database status</span>
            </div>
            <div class="endpoint">
                <span class="method post">POST</span>
                <span class="path">/api/contact</span>
                <span class="desc">Submit booking</span>
            </div>
        </div>

        <p class="footer">Barber Royale &copy; 2026 — Casablanca</p>
    </div>
</body>

</html>
